name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      package_to_install:
        description: 'Debian package name to install (leave empty for none)'
        required: false
        default: 'curl'
        type: string
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Fixes the 'repository name must be lowercase' error by forcing lowercase formatting
    - name: Lowercase the container registry path
      run: |
        echo "DOCKER_IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # Builds the Docker image safely using the new lowercase environment variable
    - name: Build the Docker image
      run: |
        docker build . \
          --file Dockerfile \
          --tag ${{ env.DOCKER_IMAGE_NAME }}:latest \
          --build-arg EXTRA_PACKAGES="${{ github.event.inputs.package_to_install }}"
